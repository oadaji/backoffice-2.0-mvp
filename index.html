<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OnePort 365 · CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Nohemi';font-style:normal;font-weight:400 500;src:url('https://db.onlinewebfonts.com/t/29ddb4605533a38e086b48fa105e0d12.woff2') format('woff2');font-display:swap}
@font-face{font-family:'Nohemi';font-style:normal;font-weight:600 800;src:url('https://db.onlinewebfonts.com/t/2acd1ac6664b7b1a1545cc36d0680783.woff2') format('woff2');font-display:swap}
:root{
  --green:#023819; --green-2:#2f6b1e; --green-3:#7fae2e; --lime:#BFFB4F; --lime-soft:#EDF4E1;
  --gold:#FFCC1A; --gold-deep:#B8860B; --success:#008751; --error:#FF1A1A;
  --cream:#FDFBF1; --panel:#FFFFFF; --page:#faf9f5; --sage:#D1DBBD;
  --line:rgba(2,56,25,.09); --line-2:rgba(2,56,25,.16);
  --ink:#383838; --muted:#808080; --muted-2:#5F5E5A;
  --sh-card:0 1px 2px rgba(2,56,25,.05);
  --sh-raise:0 2px 4px rgba(2,56,25,.05),0 10px 24px -10px rgba(2,56,25,.16);
  --sh-modal:0 4px 8px rgba(2,56,25,.06),0 18px 40px -16px rgba(2,56,25,.22);
  --tier-spot-bg:#EDEFE8; --tier-spot-tx:#5F5E5A;
  --tier-mid-bg:#FFF3CC; --tier-mid-tx:#B8860B;
  --tier-ent-bg:#023819; --tier-ent-tx:#BFFB4F;
  --f-head:'Nohemi','Poppins',sans-serif; --f-body:'Poppins',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f-body);color:var(--ink);background:var(--page);font-size:14px;-webkit-font-smoothing:antialiased}
h1,h2,h3,.head{font-family:var(--f-head)}
.app{display:flex;min-height:100vh}
.sidebar{width:60px;background:var(--green);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:6px;flex-shrink:0}
.sidebar .spacer-v{flex:1}
.sidebar .nav-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#8fae8f;cursor:pointer;position:relative}
.sidebar .nav-ico svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.sidebar .nav-ico.active{background:var(--gold);color:var(--green)}
.sidebar .nav-ico .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--error);border:1.5px solid var(--green)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:70px;background:var(--page);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 24px}
.topbar .collapse{width:34px;height:34px;border:1px solid var(--line);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--muted-2);background:#fff;cursor:pointer}
.topbar .collapse svg,.topbar .ico svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7}
.topbar h2{font-family:var(--f-head);font-size:20px;color:#1a1a1a;font-weight:600}
.topbar .spacer{flex:1}
.topbar .ico{width:38px;height:38px;border:1px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted-2);background:#fff;position:relative;cursor:pointer}
.topbar .ico .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--error);border:1.5px solid #fff}
.topbar .logo{height:64px;display:flex;align-items:center;gap:8px}
.topbar .logo-img{height:64px;width:auto;object-fit:contain}
.sidebar .ava{width:38px;height:38px;border-radius:50%;background:var(--gold);color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--f-head);font-size:14px}
.tabs{display:flex;gap:6px;padding:10px 24px 0;background:var(--page);border-bottom:1px solid var(--line)}
.tab{display:flex;align-items:center;gap:7px;padding:10px 14px 14px;color:var(--muted);font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-size:14px}
.tab svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8}
.tab:hover{color:var(--green-2)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.content{padding:22px;flex:1}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.page-head h1{font-size:24px;color:var(--green);font-weight:600}
.page-head .sub{color:var(--muted);font-size:13px;margin-top:2px}
.btn{border:1px solid transparent;border-radius:10px;padding:11px 18px;font-family:var(--f-body);font-weight:600;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:box-shadow .15s,filter .15s}
.btn-gold,.btn-lime{background:var(--lime);color:var(--green);box-shadow:var(--sh-card)}
.btn-gold:hover,.btn-lime:hover{filter:brightness(.97);box-shadow:var(--sh-raise)}
.btn-ghost{background:#fff;border:1px solid var(--line-2);color:var(--ink)}
.btn-ghost:hover{background:var(--page)}
.btn:active{transform:scale(.98)}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--sh-card)}
.kpis .kpi:first-child{background:var(--lime-soft);border-color:transparent}
.kpi .lbl{font-size:13px;color:var(--muted-2)}
.kpi-mid{display:flex;align-items:center;justify-content:space-between;margin:12px 0 6px}
.kpi .val{font-family:var(--f-head);font-size:32px;font-weight:700;color:var(--green);line-height:1}
.kpi .val.gold{color:var(--gold-deep)}
.kpi .val.green{color:var(--green)}
.kpi-ico{width:40px;height:40px;border-radius:12px;background:#DDEFC0;display:flex;align-items:center;justify-content:center;color:var(--green);flex-shrink:0}
.kpi-ico svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.kpi .note{font-size:12px;color:var(--muted)}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.toolbar .search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;border:.5px solid var(--line-2);border-radius:9px;padding:10px 13px;background:#fff;color:var(--muted)}
.toolbar select{border:.5px solid var(--line-2);border-radius:9px;padding:10px 12px;font-family:var(--f-body);font-size:13px;background:#fff;color:var(--ink)}
.viewtog{display:inline-flex;border:1px solid var(--line-2);border-radius:9px;overflow:hidden}
.viewtog button{border:none;background:#fff;color:var(--muted-2);font-family:var(--f-body);font-size:13px;font-weight:600;padding:9px 14px;cursor:pointer}
.viewtog button.on{background:var(--green);color:#fff}
.stage-pill{background:var(--tier-spot-bg);color:var(--muted-2);font-size:11px;padding:3px 9px;border-radius:6px}
.reason{font-size:12px;color:var(--muted-2);margin-top:5px}
.board{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:8px}
.col{flex:1 1 180px;min-width:180px}
.card{cursor:grab}
.card:active{cursor:grabbing}
.card.dragging{opacity:.35}
.col-body.drop-over{background:rgba(47,122,63,.08);border-radius:12px;outline:2px dashed var(--green-3);outline-offset:3px;min-height:60px}
.col-head{margin-bottom:4px}
.col-head .row{display:flex;align-items:center;gap:8px}
.stage-num{width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.stage-num.won{background:var(--success)}
.stage-num.lost{background:var(--error)}
.col-head .name{font-family:var(--f-head);font-weight:600;color:var(--green);font-size:14px}
.col-head .roll{font-size:12px;color:var(--muted);margin-top:5px}
.col-bar{height:3px;background:var(--sage);border-radius:2px;margin-top:8px}
.col-body{display:flex;flex-direction:column;gap:10px;margin-top:10px;min-height:20px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:var(--sh-card)}
.card:hover{box-shadow:var(--sh-raise)}
.card .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.card .cname{font-weight:600;font-size:14px;color:var(--green)}
.card .cval{font-weight:600;font-size:14px;color:var(--gold-deep);white-space:nowrap}
.card .bot{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.owner{display:flex;align-items:center;gap:7px}
.ava-sm{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.owner .nm{font-size:12px;color:var(--ink)}
.chip{font-size:11px;padding:3px 8px;border-radius:6px;white-space:nowrap}
.chip.spot{background:var(--tier-spot-bg);color:var(--tier-spot-tx)}
.chip.mid{background:var(--tier-mid-bg);color:var(--tier-mid-tx)}
.chip.ent{background:var(--tier-ent-bg);color:var(--tier-ent-tx)}
.chip.won{background:#EAF3DE;color:#173404;display:inline-flex;align-items:center;gap:4px}
.chip.lost{background:#FCEBEB;color:#A32D2D}
.card .outcome{margin-bottom:9px}
.card .move{margin-top:11px}
.card .move select{width:100%;border:.5px solid var(--line);border-radius:7px;padding:6px 8px;font-family:var(--f-body);font-size:12px;color:var(--muted-2);background:var(--cream);cursor:pointer}
.empty{color:var(--muted);font-size:12px;padding:10px 2px}
table{width:100%;border-collapse:collapse}
.tbl-wrap{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--sh-card)}
th{text-align:left;font-size:11px;letter-spacing:.5px;color:var(--muted-2);font-weight:600;text-transform:uppercase;padding:13px 16px;background:#F3F7EA}
td{padding:14px 16px;border-top:.5px solid var(--line);font-size:13px;vertical-align:middle}
td .co-name{font-weight:600;color:var(--green)}
td .co-dom{font-size:12px;color:var(--muted)}
td .link{color:var(--green-2)}
td .link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;vertical-align:-2px;margin-right:4px}
.icon-box{width:30px;height:30px;border-radius:7px;background:var(--tier-spot-bg);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted-2);margin-right:10px;vertical-align:middle}
.co-cell{display:flex;align-items:center}
.link-btn{border:.5px solid var(--line-2);background:#fff;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--ink)}
.overlay{position:fixed;inset:0;background:rgba(10,26,12,.42);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:460px;max-height:88vh;overflow:auto;box-shadow:var(--sh-modal)}
.modal.wide{max-width:640px}
.modal-head{padding:18px 22px;border-bottom:.5px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start}
.modal-head h3{font-family:var(--f-head);font-size:18px;color:var(--green);font-weight:600}
.modal-head .mh-sub{font-size:13px;color:var(--muted);margin-top:2px}
.modal-head .x{cursor:pointer;color:var(--muted);font-size:22px;line-height:1;background:none;border:none}
.modal-body{padding:20px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.field input,.field select{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:11px 12px;font-family:var(--f-body);font-size:14px;color:var(--ink);background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(2,56,25,.12)}
.field .prefix{display:flex;align-items:center;border:.5px solid var(--line-2);border-radius:9px;overflow:hidden}
.field .prefix span{padding:11px 12px;color:var(--muted);background:var(--cream);font-weight:600}
.field .prefix input{border:none;border-radius:0}
.combo{position:relative}
.combo-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--line-2);border-radius:10px;box-shadow:var(--sh-raise);max-height:210px;overflow:auto;z-index:5;display:none}
.combo-list.open{display:block}
.combo-item{padding:9px 12px;font-size:14px;color:var(--ink);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
.combo-item:hover{background:var(--lime-soft)}
.combo-dom{font-size:12px;color:var(--muted)}
.combo-empty{padding:10px 12px;font-size:13px;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{padding:16px 22px;border-top:.5px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.user-row{display:flex;align-items:center;gap:12px;padding:11px 8px}
.user-row .meta{flex:1;min-width:0}
.user-row .meta .un{font-size:14px;font-weight:600;color:var(--ink)}
.user-row .meta .ue{font-size:12px;color:var(--muted)}
.badge-access{background:#EAF3DE;color:#173404;font-size:12px;padding:4px 10px;border-radius:6px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--line-2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.check.on{background:var(--green);border-color:var(--green)}
.check.on svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5}
.check svg{display:none}
.check.on svg{display:block}
.remove-link{color:var(--error);font-size:13px;cursor:pointer;background:none;border:none;font-family:var(--f-body)}
.hint{background:var(--cream);border:.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--muted-2);margin-bottom:18px}
.hint b{color:var(--green)}
@media(max-width:760px){.kpis{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>

  {id:'d2',company:'c5',contact:'Adaora Nwosu',owner:'u2',amount:28000,stage:'Contacted',cls:'Mid-Tier',product:'Ocean Freight',status:'open'},

let activeTab='pipeline', pipeView='board', seq=100;
const LOST_REASONS=['Price too high','Chose competitor','Went in-house','No response','Timing not right','Other'];
const $=s=>document.querySelector(s);
const co=id=>companies.find(c=>c.id===id)||{};

const clsKey=c=>c==='Enterprise'?'ent':c==='Mid-Tier'?'mid':'spot';
function fmt(n){if(n>=1e6)return '$'+(n/1e6).toFixed(1).replace(/\.0$/,'')+'M';if(n>=1e3)return '$'+Math.round(n/1e3)+'k';return '$'+n;}
function ava(u,cls){return `<div class="ava-sm" style="background:${u.color};color:${u.tx}">${u.ini}</div>`;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tick(){return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>';}

function render(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===activeTab));
  if(activeTab==='pipeline')renderPipeline();
  else if(activeTab==='companies')renderCompanies();
  else if(activeTab==='contacts')renderContacts();
  else renderTeam();
}

function renderPipeline(){
  const open=deals.filter(d=>d.status==='open');
  const active=open.reduce((s,d)=>s+d.amount,0);
  const won=deals.filter(d=>d.status==='won');
  const wonSum=won.reduce((s,d)=>s+d.amount,0);
  let html=`
  <div class="kpis">
    <div class="kpi"><div class="lbl">Active pipeline (USD)</div><div class="kpi-mid"><div class="val">${fmt(active)}</div><span class="kpi-ico"><svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg></span></div><div class="note">${open.length} deals in progress</div></div>
    <div class="kpi"><div class="lbl">Won this month (USD)</div><div class="kpi-mid"><div class="val gold">${fmt(wonSum)}</div><span class="kpi-ico"><svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M6 4h12v5a6 6 0 01-12 0zM6 6H3v2a3 3 0 003 3M18 6h3v2a3 3 0 01-3 3"/></svg></span></div><div class="note">${won.length} deals closed</div></div>
    <div class="kpi"><div class="lbl">Total deals</div><div class="kpi-mid"><div class="val green">${deals.length}</div><span class="kpi-ico"><svg viewBox="0 0 24 24"><path d="M3 7l9-4 9 4-9 4-9-4zM3 12l9 4 9-4M3 17l9 4 9-4"/></svg></span></div><div class="note">All-time deals</div></div>
  </div>
  <div class="toolbar">
    <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Search deals…</div>
    <div class="viewtog"><button class="${pipeView==='board'?'on':''}" onclick="setView('board')">Board</button><button class="${pipeView==='list'?'on':''}" onclick="setView('list')">List</button></div>
    <select><option>All owners</option>${users.filter(u=>u.access).map(u=>`<option>${u.name}</option>`).join('')}</select>
    <button class="btn btn-gold" onclick="openNewDeal()">+ New deal</button>
  </div>`;
  html+=pipeView==='list'?renderDealList():renderBoard();
  $('#content').innerHTML=html;
}
function setView(v){pipeView=v;render();}
function renderBoard(){
  let html=`<div class="board">`;
  STAGES.forEach((stage,i)=>{
    const closed=stage==='Closed';
    const list=closed?deals.filter(d=>d.status==='won'||d.status==='lost'):deals.filter(d=>d.status==='open'&&d.stage===stage);
    let roll;
    if(closed){
      const w=list.filter(d=>d.status==='won').length,l=list.filter(d=>d.status==='lost').length;
      roll=`${w} won · ${l} lost`;
    }else{
      roll=`${list.length} · ${fmt(list.reduce((s,d)=>s+d.amount,0))}`;
    }
    html+=`<div class="col">
      <div class="col-head">
        <div class="row"><div class="stage-num">${i+1}</div><div class="name">${stage}</div></div>
        <div class="roll">${roll}</div>
        <div class="col-bar"></div>
      </div>
      <div class="col-body" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event,'${stage}')">`;
    if(!list.length)html+=`<div class="empty">Drop here</div>`;
    list.forEach(d=>{
      const c=co(d.company),u=user(d.owner);
      const badge=d.status==='won'?`<div class="outcome"><span class="chip won">${tick()} Won</span></div>`:d.status==='lost'?`<div class="outcome"><span class="chip lost">Lost</span>${d.lostReason?`<div class="reason">${esc(d.lostReason)}</div>`:''}</div>`:'';
      html+=`<div class="card" draggable="true" ondragstart="dragStart(event,'${d.id}')" ondragend="dragEnd(event)">
        ${badge}
        <div class="top"><span class="cname">${esc(c.name)}</span><span class="cval">${fmt(d.amount)}</span></div>
        <div class="bot">
          <div class="owner">${ava(u)}<span class="nm">${u.name.split(' ')[0]}</span></div>
          <span class="chip ${clsKey(d.cls)}">${d.cls}</span>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  return html;
}
function statusCell(d){
  if(d.status==='won')return `<span class="chip won">${tick()} Won</span>`;
  if(d.status==='lost')return `<span class="chip lost">Lost</span>`;
  return `<span class="stage-pill">${d.stage}</span>`;
}
function renderDealList(){
  const rows=deals.map(d=>{
    const c=co(d.company),u=user(d.owner);
    const reason=d.status==='lost'?`<span class="reason">${esc(d.lostReason||'—')}</span>`:`<span style="color:var(--muted)">—</span>`;
    return `<tr>
      <td class="co-name">${esc(c.name)}</td>
      <td style="color:var(--gold-deep);font-weight:600">${fmt(d.amount)}</td>
      <td>${statusCell(d)}</td>
      <td><span class="chip ${clsKey(d.cls)}">${d.cls}</span></td>
      <td><div class="owner">${ava(u)}<span class="nm">${u.name.split(' ')[0]}</span></div></td>
      <td>${reason}</td>
    </tr>`;
  }).join('');
  return `<div class="tbl-wrap"><table><thead><tr><th>Deal</th><th>Value</th><th>Stage</th><th>Class</th><th>Owner</th><th>Lost reason</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
let dragId=null;
function dragStart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('dragging');const b=document.querySelector('.board');if(b)b.classList.add('dragging');}
function dragEnd(e){e.currentTarget.classList.remove('dragging');const b=document.querySelector('.board');if(b)b.classList.remove('dragging');document.querySelectorAll('.drop-over').forEach(x=>x.classList.remove('drop-over'));}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drop-over');}
function dragLeave(e){e.currentTarget.classList.remove('drop-over');}
function drop(e,stage){e.preventDefault();e.currentTarget.classList.remove('drop-over');if(!dragId)return;const id=dragId;dragId=null;const b=document.querySelector('.board');if(b)b.classList.remove('dragging');const d=deals.find(x=>x.id===id);if(!d)return;if(stage==='Closed'){askOutcome(id);return;}d.stage=stage;d.status='open';render();}
function askOutcome(id){
  modal(`<div class="modal" style="max-width:380px"><div class="modal-head"><div><h3>Close this deal</h3><div class="mh-sub">Mark the outcome</div></div><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-body" style="display:flex;gap:12px">
    <button class="btn btn-lime" style="flex:1;justify-content:center" onclick="setOutcome('${id}','won')">Won</button>
    <button class="btn btn-ghost" style="flex:1;justify-content:center;color:var(--error);border-color:#F09595" onclick="askLostReason('${id}')">Lost</button>
  </div></div>`);
}
function setOutcome(id,outcome){const d=deals.find(x=>x.id===id);if(d){d.stage='Closed';d.status=outcome;}closeModal();render();}
function askLostReason(id){
  modal(`<div class="modal" style="max-width:400px"><div class="modal-head"><div><h3>Mark as lost</h3><div class="mh-sub">Why was this deal lost?</div></div><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <div class="field"><label>Reason</label><select id="lr-reason">${LOST_REASONS.map(r=>`<option>${r}</option>`).join('')}</select></div>
    <div class="field"><label>Note (optional)</label><input id="lr-note" placeholder="Add context…"></div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="askOutcome('${id}')">Back</button><button class="btn btn-ghost" style="color:var(--error);border-color:#F09595" onclick="confirmLost('${id}')">Mark as lost</button></div></div>`);
}
function confirmLost(id){const d=deals.find(x=>x.id===id);const reason=$('#lr-reason').value,note=$('#lr-note').value.trim();if(d){d.stage='Closed';d.status='lost';d.lostReason=note?reason+' — '+note:reason;}closeModal();render();}

function renderCompanies(){
  let html=`<div class="page-head"><div><h1>Companies</h1><div class="sub">${companies.length} companies</div></div>
    <button class="btn btn-gold" onclick="openAddCompany()">+ Add company</button></div>
    <div class="tbl-wrap"><table><thead><tr><th>Company</th><th>Class</th><th>Owner</th><th>Deals</th><th></th></tr></thead><tbody>`;
  companies.forEach(c=>{
    const u=user(c.owner);const n=deals.filter(d=>d.company===c.id).length;
    html+=`<tr>
      <td><div class="co-cell"><span class="icon-box">${c.name.slice(0,2).toUpperCase()}</span><div><div class="co-name">${esc(c.name)}</div><div class="co-dom">${c.domain}</div></div></div></td>
      <td><span class="chip ${clsKey(c.cls)}">${c.cls}</span></td>
      <td><div class="owner">${ava(u)}<span class="nm">${u.name.split(' ')[0]}</span></div></td>
      <td>${n}</td>
      <td style="text-align:right"><button class="link-btn">Edit</button></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  $('#content').innerHTML=html;
}

function renderContacts(){
  let html=`<div class="page-head"><div><h1>Contacts</h1><div class="sub">${contacts.length} contacts</div></div>
    <button class="btn btn-gold" onclick="openAddContact()">+ Add contact</button></div>
    <div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Company</th><th>Title</th><th>Email</th><th>Phone</th></tr></thead><tbody>`;
  contacts.forEach(ct=>{
    const c=co(ct.company);
    html+=`<tr>
      <td class="co-name">${esc(ct.name)}</td>
      <td><span class="link"><svg viewBox="0 0 24 24"><path d="M5 3h11l3 3v15H5z"/><path d="M9 8h6M9 12h6"/></svg>${esc(c.name)}</span></td>
      <td style="color:var(--muted-2)">${ct.title}</td>
      <td><span class="link">${ct.email}</span></td>
      <td>${ct.phone}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  $('#content').innerHTML=html;
}

function renderTeam(){
  const withA=users.filter(u=>u.access);
  let html=`<div class="page-head"><div><h1>Team access</h1><div class="sub">${withA.length} users can add and update deals</div></div>
    <button class="btn btn-gold" onclick="openGrant()">+ Add access</button></div>
    <div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Role</th><th>Email</th><th></th></tr></thead><tbody>`;
  withA.forEach(u=>{
    html+=`<tr>
      <td><div class="owner">${ava(u)}<span class="nm" style="font-weight:600">${u.name}</span></div></td>
      <td style="color:var(--muted-2)">${u.role}</td>
      <td><span class="link">${u.email}</span></td>
      <td style="text-align:right"><button class="remove-link" onclick="revoke('${u.id}')">Remove</button></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  $('#content').innerHTML=html;
}
function revoke(id){user(id).access=false;render();}

function modal(html){$('#overlay').innerHTML=html;$('#overlay').classList.add('open');}
function closeModal(){$('#overlay').classList.remove('open');$('#overlay').innerHTML='';}
$('#overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

function openNewDeal(){
  modal(`<div class="modal"><div class="modal-head"><div><h3>Create new deal</h3><div class="mh-sub">Add a new opportunity to the pipeline</div></div><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <div class="field"><label>Company</label>
      <div class="combo">
        <input id="nd-co-search" placeholder="Search companies…" autocomplete="off" oninput="comboFilter('nd-co')" onfocus="comboFilter('nd-co')" onblur="comboBlur('nd-co')">
        <input type="hidden" id="nd-co">
        <div class="combo-list" id="nd-co-list"></div>
      </div>
    </div>
    <div class="field"><label>Contact</label><input id="nd-ct" placeholder="Contact name"></div>
    <div class="field"><label>Deal value (USD)</label><div class="prefix"><span>$</span><input id="nd-amt" type="number" placeholder="Amount" min="0"></div></div>
    <div class="grid2">
      <div class="field"><label>Class</label><select id="nd-cls">${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="field"><label>Product</label><select id="nd-prod">${PRODUCTS.map(p=>`<option>${p}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Owner</label><select id="nd-own">${users.filter(u=>u.access).map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select></div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-lime" onclick="createDeal()">Create deal</button></div></div>`);
}
function createDeal(){
  const coId=$('#nd-co').value;if(!coId){$('#nd-co-search').focus();return;}
  const amt=parseInt($('#nd-amt').value)||0;
  if(!amt){$('#nd-amt').focus();return;}
  deals.push({id:'d'+(seq++),company:coId,contact:$('#nd-ct').value,owner:$('#nd-own').value,amount:amt,stage:'Prospect',cls:$('#nd-cls').value,product:$('#nd-prod').value,status:'open'});
  closeModal();render();
}
function comboItems(p,q){
  q=(q||'').toLowerCase();
  const items=companies.filter(c=>c.name.toLowerCase().includes(q));
  if(!items.length)return `<div class="combo-empty">No company found</div>`;
  return items.map(c=>`<div class="combo-item" data-id="${c.id}" data-name="${esc(c.name)}" onmousedown="comboPick('${p}',this)">${esc(c.name)}<span class="combo-dom">${esc(c.domain||'')}</span></div>`).join('');
}
function comboFilter(p){const l=$('#'+p+'-list');l.innerHTML=comboItems(p,$('#'+p+'-search').value);l.classList.add('open');}
function comboPick(p,el){$('#'+p).value=el.getAttribute('data-id');$('#'+p+'-search').value=el.getAttribute('data-name');$('#'+p+'-list').classList.remove('open');}
function comboBlur(p){setTimeout(()=>{const l=$('#'+p+'-list');if(l)l.classList.remove('open');},150);}

function openAddCompany(){
  modal(`<div class="modal"><div class="modal-head"><div><h3>Add company</h3></div><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <div class="field"><label>Company name</label><input id="ac-name" placeholder="Company name"></div>
    <div class="field"><label>Website</label><input id="ac-dom" placeholder="example.com"></div>
    <div class="grid2">
      <div class="field"><label>Class</label><select id="ac-cls">${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="field"><label>Owner</label><select id="ac-own">${users.filter(u=>u.access).map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Industry</label><input id="ac-ind" placeholder="Industry"></div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-lime" onclick="createCompany()">Add company</button></div></div>`);
}
function createCompany(){
  const name=$('#ac-name').value.trim();if(!name){$('#ac-name').focus();return;}
  companies.push({id:'c'+(seq++),name,domain:$('#ac-dom').value.trim(),cls:$('#ac-cls').value,owner:$('#ac-own').value,industry:$('#ac-ind').value.trim()});
  closeModal();render();
}

function openAddContact(){
  modal(`<div class="modal"><div class="modal-head"><div><h3>Add contact</h3><div class="mh-sub">Contacts link to one company</div></div><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <div class="field"><label>Full name</label><input id="at-name" placeholder="Full name"></div>
    <div class="field"><label>Company</label>
      <div class="combo">
        <input id="at-co-search" placeholder="Search companies…" autocomplete="off" oninput="comboFilter('at-co')" onfocus="comboFilter('at-co')" onblur="comboBlur('at-co')">
        <input type="hidden" id="at-co">
        <div class="combo-list" id="at-co-list"></div>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label>Title</label><input id="at-title" placeholder="e.g. Procurement Manager"></div>
      <div class="field"><label>Phone</label><input id="at-phone" placeholder="+234…"></div>
    </div>
    <div class="field"><label>Email</label><input id="at-email" placeholder="name@company.com"></div>
  </div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-lime" onclick="createContact()">Add contact</button></div></div>`);
}
function createContact(){
  const name=$('#at-name').value.trim();if(!name){$('#at-name').focus();return;}
  if(!$('#at-co').value){$('#at-co-search').focus();return;}
  contacts.push({id:'ct'+(seq++),name,company:$('#at-co').value,title:$('#at-title').value.trim(),email:$('#at-email').value.trim(),phone:$('#at-phone').value.trim()});
  closeModal();render();
}

let grantSel={};
function openGrant(){
  grantSel={};
  const rows=users.map(u=>{
    if(u.access)return `<div class="user-row">${ava(u)}<div class="meta"><div class="un">${u.name}</div><div class="ue">${u.role} · ${u.email}</div></div><span class="badge-access">${tick()} Has access</span></div>`;
    return `<div class="user-row" onclick="toggleGrant('${u.id}',this)" style="cursor:pointer">${ava(u)}<div class="meta"><div class="un">${u.name}</div><div class="ue">${u.role} · ${u.email}</div></div><span class="check" data-u="${u.id}">${tick()}</span></div>`;
  }).join('');
  modal(`<div class="modal"><div class="modal-head"><div><h3>Add team access</h3><div class="mh-sub">Select users who can add and update deals</div></div><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-body" style="padding-top:8px">
    <div class="search" style="margin-bottom:6px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Search users</div>
    ${rows}
  </div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-gold" id="grant-btn" onclick="grant()">Grant access (0)</button></div></div>`);
}
function toggleGrant(id,row){
  grantSel[id]=!grantSel[id];
  row.querySelector('.check').classList.toggle('on',grantSel[id]);
  const n=Object.values(grantSel).filter(Boolean).length;
  $('#grant-btn').textContent=`Grant access (${n})`;
}
function grant(){Object.keys(grantSel).forEach(id=>{if(grantSel[id])user(id).access=true;});closeModal();render();}

document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('.tab');if(!t)return;activeTab=t.dataset.tab;render();
});
render();
</script>
</body>
</html>
