<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OnePort 365 · CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
@font-face{font-family:'Nohemi';font-style:normal;font-weight:400 500;src:url('https://db.onlinewebfonts.com/t/29ddb4605533a38e086b48fa105e0d12.woff2') format('woff2');font-display:swap}
@font-face{font-family:'Nohemi';font-style:normal;font-weight:600 800;src:url('https://db.onlinewebfonts.com/t/2acd1ac6664b7b1a1545cc36d0680783.woff2') format('woff2');font-display:swap}
:root{
  --green:#023819; --green-2:#2f6b1e; --green-3:#7fae2e; --lime:#BFFB4F; --lime-soft:#EDF4E1;
  --gold:#FFCC1A; --gold-deep:#B8860B; --success:#008751; --error:#FF1A1A;
  --cream:#FDFBF1; --panel:#FFFFFF; --page:#faf9f5; --sage:#D1DBBD;
  --line:rgba(2,56,25,.09); --line-2:rgba(2,56,25,.16);
  --ink:#383838; --muted:#808080; --muted-2:#5F5E5A;
  --sh-card:0 1px 2px rgba(2,56,25,.05);
  --sh-raise:0 2px 4px rgba(2,56,25,.05),0 10px 24px -10px rgba(2,56,25,.16);
  --sh-modal:0 4px 8px rgba(2,56,25,.06),0 18px 40px -16px rgba(2,56,25,.22);
  --tier-spot-bg:#EDEFE8; --tier-spot-tx:#5F5E5A;
  --tier-mid-bg:#FFF3CC; --tier-mid-tx:#B8860B;
  --tier-ent-bg:#023819; --tier-ent-tx:#BFFB4F;
  --f-head:'Nohemi','Poppins',sans-serif; --f-body:'Poppins',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f-body);color:var(--ink);background:var(--page);font-size:14px;-webkit-font-smoothing:antialiased}
h1,h2,h3,.head{font-family:var(--f-head)}
.app{display:flex;min-height:100vh}
.sidebar{width:60px;background:var(--green);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:6px;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;height:100vh}
.sidebar .spacer-v{flex:1}
.sidebar .nav-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#8fae8f;cursor:pointer;position:relative}
.sidebar .nav-ico svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.sidebar .nav-ico.active{background:var(--gold);color:var(--green)}
.sidebar .nav-ico .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--error);border:1.5px solid var(--green)}
.sidebar .nav-ico[data-tooltip]:hover::after{content:attr(data-tooltip);position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);background:var(--green);color:#fff;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:600;white-space:nowrap;box-shadow:var(--sh-raise);z-index:1000}
.sidebar .nav-ico[data-tooltip]:hover::before{content:'';position:absolute;left:calc(100% + 6px);top:50%;transform:translateY(-50%);border:6px solid transparent;border-right-color:var(--green);z-index:1000}
.main{flex:1;display:flex;flex-direction:column;min-width:0;margin-left:60px}
.topbar{height:70px;background:var(--page);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 24px}
.topbar .collapse{width:34px;height:34px;border:1px solid var(--line);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--muted-2);background:#fff;cursor:pointer}
.topbar .collapse svg,.topbar .ico svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7}
.topbar h2{font-family:var(--f-head);font-size:20px;color:#1a1a1a;font-weight:600}
.topbar .spacer{flex:1}
.topbar .ico{width:38px;height:38px;border:1px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted-2);background:#fff;position:relative;cursor:pointer}
.topbar .ico .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--error);border:1.5px solid #fff}
.topbar .logo{height:48px;display:flex;align-items:center;gap:8px}
.topbar .logo-img{height:48px;width:auto;object-fit:contain}
.sidebar .ava{width:38px;height:38px;border-radius:50%;background:var(--gold);color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--f-head);font-size:14px}
.tabs{display:flex;gap:6px;padding:10px 24px 0;background:var(--page);border-bottom:1px solid var(--line)}
.tab{display:flex;align-items:center;gap:7px;padding:10px 14px 14px;color:var(--muted);font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-size:14px}
.tab svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8}
.tab:hover{color:var(--green-2)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.content{padding:22px;flex:1}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.page-head h1{font-size:24px;color:var(--green);font-weight:600}
.page-head .sub{color:var(--muted);font-size:13px;margin-top:2px}
.btn{border:1px solid transparent;border-radius:10px;padding:11px 18px;font-family:var(--f-body);font-weight:600;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:box-shadow .15s,filter .15s}
.btn-gold,.btn-lime{background:var(--lime);color:var(--green);box-shadow:var(--sh-card)}
.btn-gold:hover,.btn-lime:hover{filter:brightness(.97);box-shadow:var(--sh-raise)}
.btn-ghost{background:#fff;border:1px solid var(--line-2);color:var(--ink)}
.btn-ghost:hover{background:var(--page)}
.btn:active{transform:scale(.98)}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--sh-card)}
.kpis .kpi:first-child{background:var(--lime-soft);border-color:transparent}
.kpi .lbl{font-size:13px;color:var(--muted-2)}
.kpi-mid{display:flex;align-items:center;justify-content:space-between;margin:12px 0 6px}
.kpi .val{font-family:var(--f-head);font-size:32px;font-weight:700;color:var(--green);line-height:1}
.kpi .val.gold{color:var(--gold-deep)}
.kpi .val.green{color:var(--green)}
.kpi-ico{width:40px;height:40px;border-radius:12px;background:#DDEFC0;display:flex;align-items:center;justify-content:center;color:var(--green);flex-shrink:0}
.kpi-ico svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.kpi .note{font-size:12px;color:var(--muted)}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.toolbar .search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;border:.5px solid var(--line-2);border-radius:9px;padding:10px 13px;background:#fff;color:var(--muted)}
.toolbar select{border:.5px solid var(--line-2);border-radius:9px;padding:10px 12px;font-family:var(--f-body);font-size:13px;background:#fff;color:var(--ink)}
.viewtog{display:inline-flex;border:1px solid var(--line-2);border-radius:9px;overflow:hidden}
.viewtog button{border:none;background:#fff;color:var(--muted-2);font-family:var(--f-body);font-size:13px;font-weight:600;padding:9px 14px;cursor:pointer}
.viewtog button.on{background:var(--green);color:#fff}
.stage-pill{background:var(--tier-spot-bg);color:var(--muted-2);font-size:11px;padding:3px 9px;border-radius:6px}
.reason{font-size:12px;color:var(--muted-2);margin-top:5px}
.board{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:8px}
.col{flex:1 1 180px;min-width:180px}
.card{cursor:grab}
.card:active{cursor:grabbing}
.card.dragging{opacity:.35}
.col-body.drop-over{background:rgba(47,122,63,.08);border-radius:12px;outline:2px dashed var(--green-3);outline-offset:3px;min-height:60px}
.col-head{margin-bottom:4px}
.col-head .row{display:flex;align-items:center;gap:8px}
.stage-num{width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.stage-num.won{background:var(--success)}
.stage-num.lost{background:var(--error)}
.col-head .name{font-family:var(--f-head);font-weight:600;color:var(--green);font-size:14px}
.col-head .roll{font-size:12px;color:var(--muted);margin-top:5px}
.col-bar{height:3px;background:var(--sage);border-radius:2px;margin-top:8px}
.col-body{display:flex;flex-direction:column;gap:10px;margin-top:10px;min-height:20px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:var(--sh-card)}
.card:hover{box-shadow:var(--sh-raise)}
.card .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.card .cname{font-weight:600;font-size:14px;color:var(--green)}
.card .cval{font-weight:600;font-size:14px;color:var(--gold-deep);white-space:nowrap}
.card .bot{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.owner{display:flex;align-items:center;gap:7px}
.ava-sm{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.owner .nm{font-size:12px;color:var(--ink)}
.chip{font-size:11px;padding:3px 8px;border-radius:6px;white-space:nowrap}
.chip.spot{background:var(--tier-spot-bg);color:var(--tier-spot-tx)}
.chip.mid{background:var(--tier-mid-bg);color:var(--tier-mid-tx)}
.chip.ent{background:var(--tier-ent-bg);color:var(--tier-ent-tx)}
.chip.won{background:#EAF3DE;color:#173404;display:inline-flex;align-items:center;gap:4px}
.chip.lost{background:#FCEBEB;color:#A32D2D}
.card .outcome{margin-bottom:9px}
.card .move{margin-top:11px}
.card .move select{width:100%;border:.5px solid var(--line);border-radius:7px;padding:6px 8px;font-family:var(--f-body);font-size:12px;color:var(--muted-2);background:var(--cream);cursor:pointer}
.empty{color:var(--muted);font-size:12px;padding:10px 2px}
table{width:100%;border-collapse:collapse}
.tbl-wrap{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--sh-card)}
th{text-align:left;font-size:11px;letter-spacing:.5px;color:var(--muted-2);font-weight:600;text-transform:uppercase;padding:13px 16px;background:#F3F7EA}
td{padding:14px 16px;border-top:.5px solid var(--line);font-size:13px;vertical-align:middle}
td .co-name{font-weight:600;color:var(--green)}
td .co-dom{font-size:12px;color:var(--muted)}
td .link{color:var(--green-2)}
td .link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;vertical-align:-2px;margin-right:4px}
.icon-box{width:30px;height:30px;border-radius:7px;background:var(--tier-spot-bg);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted-2);margin-right:10px;vertical-align:middle}
.co-cell{display:flex;align-items:center}
.link-btn{border:.5px solid var(--line-2);background:#fff;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--ink)}
.comment-cell{max-width:280px}
.comment-text{font-size:13px;color:var(--ink);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.comment-meta{font-size:11px;color:var(--muted)}
.overlay{position:fixed;inset:0;background:rgba(10,26,12,.42);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:460px;max-height:88vh;overflow:auto;box-shadow:var(--sh-modal)}
.modal.wide{max-width:640px}
.modal-head{padding:18px 22px;border-bottom:.5px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start}
.modal-head h3{font-family:var(--f-head);font-size:18px;color:var(--green);font-weight:600}
.modal-head .mh-sub{font-size:13px;color:var(--muted);margin-top:2px}
.modal-head .x{cursor:pointer;color:var(--muted);font-size:22px;line-height:1;background:none;border:none}
.modal-body{padding:20px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.field input,.field select{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:11px 12px;font-family:var(--f-body);font-size:14px;color:var(--ink);background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(2,56,25,.12)}
.field .prefix{display:flex;align-items:center;border:.5px solid var(--line-2);border-radius:9px;overflow:hidden}
.field .prefix span{padding:11px 12px;color:var(--muted);background:var(--cream);font-weight:600}
.field .prefix input{border:none;border-radius:0}
.combo{position:relative}
.combo-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--line-2);border-radius:10px;box-shadow:var(--sh-raise);max-height:210px;overflow:auto;z-index:5;display:none}
.combo-list.open{display:block}
.combo-item{padding:9px 12px;font-size:14px;color:var(--ink);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
.combo-item:hover{background:var(--lime-soft)}
.combo-dom{font-size:12px;color:var(--muted)}
.combo-empty{padding:10px 12px;font-size:13px;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{padding:16px 22px;border-top:.5px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.user-row{display:flex;align-items:center;gap:12px;padding:11px 8px}
.user-row .meta{flex:1;min-width:0}
.user-row .meta .un{font-size:14px;font-weight:600;color:var(--ink)}
.user-row .meta .ue{font-size:12px;color:var(--muted)}
.badge-access{background:#EAF3DE;color:#173404;font-size:12px;padding:4px 10px;border-radius:6px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--line-2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.check.on{background:var(--green);border-color:var(--green)}
.check.on svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5}
.check svg{display:none}
.check.on svg{display:block}
.remove-link{color:var(--error);font-size:13px;cursor:pointer;background:none;border:none;font-family:var(--f-body)}
.hint{background:var(--cream);border:.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--muted-2);margin-bottom:18px}
.hint b{color:var(--green)}
.account-header{padding:22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px}
.account-ava{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;font-family:var(--f-head);flex-shrink:0}
.account-info h3{font-size:20px;color:var(--green);margin-bottom:2px}
.account-info .role{font-size:14px;color:var(--muted);margin-bottom:4px}
.account-info .email{font-size:13px;color:var(--muted-2)}
.account-section{padding:22px;border-bottom:1px solid var(--line)}
.account-section:last-child{border-bottom:none}
.account-section h4{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px;font-weight:600}
.account-detail{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.account-detail .label{font-size:14px;color:var(--muted-2)}
.account-detail .value{font-size:14px;font-weight:600;color:var(--ink)}
.permission-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600}
.permission-badge.super-admin{background:var(--lime);color:var(--green)}
.permission-badge.user{background:var(--sage);color:var(--green)}
.team-badge{display:inline-flex;align-items:center;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;background:var(--cream);color:var(--green);border:1px solid var(--line)}
.team-members{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.team-member{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;background:var(--page)}
.team-member-ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;font-family:var(--f-head);flex-shrink:0}
.team-member-info{flex:1;min-width:0}
.team-member-name{font-size:14px;font-weight:600;color:var(--ink)}
.team-member-role{font-size:12px;color:var(--muted)}
.account-dropdown{position:absolute;bottom:0;left:calc(100% + 12px);background:#fff;border:1px solid var(--line-2);border-radius:10px;box-shadow:var(--sh-raise);min-width:220px;z-index:1000;display:none}
.account-dropdown.open{display:block}
.account-dropdown::after{content:'';position:absolute;top:auto;bottom:12px;right:100%;border:8px solid transparent;border-right-color:#fff}
.account-dropdown::before{content:'';position:absolute;top:auto;bottom:12px;right:100%;border:9px solid transparent;border-right-color:var(--line-2);z-index:-1;margin-right:1px}
.dropdown-header{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.dropdown-ava{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:var(--f-head);flex-shrink:0}
.dropdown-user-info{flex:1;min-width:0}
.dropdown-user-name{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dropdown-user-role{font-size:12px;color:var(--muted)}
.dropdown-menu{padding:6px}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:14px;color:var(--ink);cursor:pointer;transition:background .15s}
.dropdown-item:hover{background:var(--page)}
.dropdown-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;color:var(--muted-2)}
.dropdown-item.logout{color:var(--error)}
.dropdown-item.logout svg{color:var(--error)}
@media(max-width:760px){.kpis{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
.btn-outline{background:#fff;border:1px solid var(--line-2);color:var(--green-2);padding:9px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-outline:hover{background:var(--lime-soft);border-color:var(--green-3)}
.btn-outline svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
.btn-upload-large{background:var(--lime);border:none;color:var(--green);padding:11px 20px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--sh-card)}
.btn-upload-large:hover{filter:brightness(.97)}
.btn-upload-large svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.rates-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.rates-actions{display:flex;gap:10px;align-items:center}
.rate-row{cursor:pointer;transition:background .15s}
.rate-row:hover{background:var(--lime-soft)}
.rate-row.expired{background:#FFF5F5;opacity:0.85}
.rate-row.expired:hover{background:#FFEBEB}
.carrier-logo{width:28px;height:28px;border-radius:6px;background:#fff;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--green);margin-right:8px;vertical-align:middle;overflow:hidden}
.carrier-logo img{width:100%;height:100%;object-fit:contain;padding:0}
.carrier-logo.msc{background:#003D6B;color:#fff}
.carrier-logo.maersk{background:#42B0D5;color:#fff}
.carrier-logo.cma{background:#009EE0;color:#fff}
.carrier-logo.hapag{background:#F27E21;color:#fff}
.carrier-logo.cosco{background:#003087;color:#fff}
.carrier-logo.evergreen{background:#005A32;color:#fff}
.carrier-logo.one{background:#E4032E;color:#fff}
.carrier-logo.pil{background:#003DA5;color:#fff}
.carrier-logo.zim{background:#0066B3;color:#fff}
.equip-badge{display:inline-block;font-size:12px;padding:3px 7px;border-radius:5px;font-weight:600;background:var(--cream);color:var(--muted-2);border:1px solid var(--line)}
.rate-badge{font-size:11px;padding:4px 10px;border-radius:6px;font-weight:600;text-transform:capitalize;background:#E8F5E9;color:#2E7D32}

function renderBoard(){
  let html=`<div class="board">`;

    const closed=stage==='Closed';
    const list=closed?deals.filter(d=>d.status==='won'||d.status==='lost'):deals.filter(d=>d.status==='open'&&d.stage===stage);
    let roll;
    if(closed){
      const w=list.filter(d=>d.status==='won').length,l=list.filter(d=>d.status==='lost').length;
      roll=`${w} won · ${l} lost`;
    }else{
      roll=`${list.length} · ${fmt(list.reduce((s,d)=>s+d.amount,0))}`;
    }
    html+=`<div class="col">
      <div class="col-head">

      </div>
      <div class="col-body" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event,'${stage}')">`;
    if(!list.length)html+=`<div class="empty">Drop here</div>`;

function formatCommentDate(timestamp){
  const date=new Date(timestamp);
  const now=new Date();
  const diffMs=now-date;
  const diffMins=Math.floor(diffMs/60000);
  const diffHours=Math.floor(diffMs/3600000);
  const diffDays=Math.floor(diffMs/86400000);
  if(diffMins<1)return 'just now';
  if(diffMins<60)return diffMins+'m ago';
  if(diffHours<24)return diffHours+'h ago';
  if(diffDays<7)return diffDays+'d ago';
  return date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function renderShipmentDetail(){
  const s=shipments.find(x=>x.id===selectedShipment);
  if(!s)return;
  const c=co(s.customer);
  const shipIcon=`<svg viewBox="0 0 24 24" width="24" height="24" stroke="var(--green)" fill="none" stroke-width="1.5"><path d="M4 10 L6 14 L18 14 L20 10 Z M6 14 L6 18 L18 18 L18 14 M2 18 C2 18 4 20 12 20 C20 20 22 18 22 18 L18 18 M8 10 L8 6 L16 6 L16 10"/></svg>`;

  let html=`
  <div class="shipment-header">
    <button class="back-btn" onclick="backToShipments()">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back
    </button>
    <h1>${shipIcon} ${s.ref} / ${c.name||s.customer}</h1>
  </div>

  <div class="shipment-tabs">
    <button class="shipment-tab ${shipmentTab==='progress'?'active':''}" onclick="setShipmentTab('progress')">Progress</button>
    <button class="shipment-tab ${shipmentTab==='containers'?'active':''}" onclick="setShipmentTab('containers')">Containers</button>
    <button class="shipment-tab ${shipmentTab==='documents'?'active':''}" onclick="setShipmentTab('documents')">Documents</button>
    <button class="shipment-tab ${shipmentTab==='finance'?'active':''}" onclick="setShipmentTab('finance')">Finance</button>
    <button class="shipment-tab ${shipmentTab==='team'?'active':''}" onclick="setShipmentTab('team')">Team</button>
    <button class="shipment-tab ${shipmentTab==='messages'?'active':''}" onclick="setShipmentTab('messages')">Messages</button>
  </div>`;

  // Tab content
  if(shipmentTab==='progress'){
    html+=renderProgressTab(s);
  }else if(shipmentTab==='containers'){
    html+=renderContainersTab(s);
  }else if(shipmentTab==='documents'){
    html+=renderDocumentsTab(s);
  }else if(shipmentTab==='finance'){
    html+=renderFinanceTab(s);
  }else if(shipmentTab==='team'){
    html+=renderTeamTab(s);
  }else if(shipmentTab==='messages'){
    html+=renderMessagesTab(s);
  }

  $('#content').innerHTML=html;
}

function renderProgressTab(s){
  const currentIdx=SHIPMENT_STAGES.indexOf(s.stage);
  let html=`<div class="progress-bar">`;
  SHIPMENT_STAGES.forEach((stage,i)=>{
    const isDone=i<currentIdx;
    const isActive=i===currentIdx;
    const cls=isDone?'done':isActive?'active':'';
    html+=`<div class="progress-step ${cls}">
      <div class="dot">${isDone?'✓':(i+1)}</div>
      <div class="label">${stage}</div>
      ${i<SHIPMENT_STAGES.length-1?'<div class="line"></div>':''}
    </div>`;
  });
  html+=`</div>`;

  html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h3 style="font-size:16px;color:var(--green)">Jobs</h3>
    <button class="btn btn-ghost" onclick="openAddJob('${s.id}')"><svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Add Job</button>
  </div>`;

  html+=`<div class="tbl-wrap"><table><thead><tr>
    <th>JOB</th>
    <th>TASK</th>
    <th>STAGE</th>
    <th>ASSIGNEE</th>
    <th>START</th>
    <th>DUE</th>
    <th></th>
  </tr></thead><tbody>`;

  s.jobs.forEach((job,i)=>{
    const u=user(job.assignee);
    const stageClass=job.stage.toLowerCase().replace(/\s+/g,'-');
    const startDate=new Date(job.startDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    const dueDate=new Date(job.dueDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    html+=`<tr class="job-row">
      <td style="font-weight:600">Job ${i+1}${String.fromCharCode(65+i%26)}</td>
      <td>${job.task}</td>
      <td><select class="job-stage-select ${stageClass}">
        <option ${job.stage==='Pending'?'selected':''}>Pending</option>
        <option ${job.stage==='In Progress'?'selected':''}>In Progress</option>
        <option ${job.stage==='Blocked'?'selected':''}>Blocked</option>
        <option ${job.stage==='Completed'?'selected':''}>Completed</option>
      </select></td>
      <td><div class="owner">${ava(u)}<span class="nm">${u.name||'—'}</span></div></td>
      <td>${startDate}</td>
      <td>${dueDate}</td>
      <td><a href="#" onclick="openJobComments('${s.id}','${job.id}');return false;" style="color:var(--green-2);font-size:13px">View Comments</a></td>
    </tr>`;
  });

  html+=`</tbody></table></div>`;
  return html;
}

  document.querySelectorAll('.msg-channel-tab').forEach(t=>t.classList.remove('active'));

  document.querySelectorAll('.msg-item').forEach(item=>{

    if(channel==='all'||itemChannel===channel){

      item.style.display='none';

  });
}

let currentWizardStep=1;
function wizardStep(dir){
  const newStep=currentWizardStep+dir;
  if(newStep<1||newStep>3)return;
  document.getElementById('wstep'+currentWizardStep).classList.remove('active');
  document.getElementById('wdot'+currentWizardStep).classList.remove('active');
  if(dir>0)document.getElementById('wdot'+currentWizardStep).classList.add('done');
  currentWizardStep=newStep;
  document.getElementById('wstep'+currentWizardStep).classList.add('active');
  document.getElementById('wdot'+currentWizardStep).classList.add('active');
  document.getElementById('wizardStepNum').textContent=currentWizardStep;
  document.getElementById('wizardBack').style.display=currentWizardStep>1?'inline-flex':'none';
  document.getElementById('wizardNext').textContent=currentWizardStep===3?'Create Shipment':'Next';
  if(currentWizardStep===3){
    document.getElementById('wizardNext').onclick=function(){closeModal();};
  }
}

// Rates helper functions
function carrierClass(name){
  const n=name.toLowerCase();
  if(n.includes('msc'))return 'msc';
  if(n.includes('maersk'))return 'maersk';
  if(n.includes('cma'))return 'cma';
  if(n.includes('hapag'))return 'hapag';
  if(n.includes('cosco'))return 'cosco';
  if(n.includes('evergreen'))return 'evergreen';
  if(n.includes('one'))return 'one';
  if(n.includes('pil'))return 'pil';
  if(n.includes('zim'))return 'zim';
  return '';
}

function carrierLogo(name){
  const cls=carrierClass(name);
  if(cls) return `assets/carriers/${cls}.svg`;
  return null;
}

function switchUploadMode(mode){
  document.querySelectorAll('.upload-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.upload-view').forEach(v=>v.classList.remove('active'));

  if(mode==='bulk'){
    document.querySelectorAll('.upload-tab')[0].classList.add('active');
    document.getElementById('bulkView').classList.add('active');
    document.getElementById('submitBtn').textContent='Upload Rates';
  }else{
    document.querySelectorAll('.upload-tab')[1].classList.add('active');
    document.getElementById('individualView').classList.add('active');
    document.getElementById('submitBtn').textContent='Add Rate';
    updateUploadForm();
  }
}

function updateUploadColumns(){
  const rateType=document.getElementById('rateTypeSelect').value;
  const columnsText=document.getElementById('columnsText');

  const columns={
    'ocean':'<strong>Ocean Freight:</strong> carrier, pol, pod, origin, dest, rateType, rate20, rate40, rate40hc, transit, freeDays, expiry',

    'haulage-export':'<strong>Export Haulage:</strong> terminal, port, originCity, state, price20, price40, price2x20, expiry',
    'haulage-import':'<strong>Import Haulage:</strong> terminal, port, destCity, state, price20, price40, price2x20, expiry',

  columnsText.innerHTML=columns[rateType];

function updateUploadForm(){
  const rateType=document.getElementById('rateTypeSelect').value;
  document.querySelectorAll('.rate-form').forEach(f=>f.style.display='none');

  if(rateType==='ocean'||rateType==='air'){
    document.getElementById('oceanForm').style.display='block';
  }else if(rateType==='haulage-export'){
    document.getElementById('haulageExportForm').style.display='block';
  }else if(rateType==='haulage-import'){
    document.getElementById('haulageImportForm').style.display='block';
  }else if(rateType==='other'){
    document.getElementById('otherForm').style.display='block';
  }

function renderRates(){
  const today=new Date();
  const soon=new Date();soon.setDate(soon.getDate()+14);

  function isExpiringSoon(dateStr){
    const exp=new Date(dateStr);
    return exp<=soon&&exp>=today;
  }

  function formatExpiry(dateStr){
    const exp=new Date(dateStr);
    const days=Math.ceil((exp-today)/(1000*60*60*24));
    if(isExpiringSoon(dateStr))return `<span class="expiry-soon">${days}d left</span>`;
    return `<span class="expiry-normal">${exp.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>`;
  }

  function formatAmount(amt,type){
    if(type==='air')return `$${amt.toFixed(2)}/kg`;
    if(type==='haulage-export'||type==='haulage-import'||type==='other')return `₦${amt.toLocaleString()}`;
    return `$${amt.toLocaleString()}`;
  }

  const RATE_TYPES=[
    {key:'ocean',label:'Ocean Freight',icon:'<svg viewBox="0 0 24 24"><path d="M3 18h18M4 12h16v6H4zM6 12V8l6-4 6 4v4"/></svg>'},
    {key:'air',label:'Air Freight',icon:'<svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 10-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>'},
    {key:'haulage-export',label:'Export Haulage',icon:'<svg viewBox="0 0 24 24"><rect x="1" y="9" width="14" height="9" rx="1"/><path d="M15 12h4l2 3v3h-3M15 18H4M8 18v-2a2 2 0 114 0v2"/><circle cx="7" cy="18" r="2"/><circle cx="18" cy="18" r="2"/><path d="M1 9l3-4h8"/></svg>'},
    {key:'haulage-import',label:'Import Haulage',icon:'<svg viewBox="0 0 24 24"><rect x="1" y="9" width="14" height="9" rx="1"/><path d="M15 12h4l2 3v3h-3M15 18H4M8 18v-2a2 2 0 114 0v2"/><circle cx="7" cy="18" r="2"/><circle cx="18" cy="18" r="2"/><path d="M19 6l-3 4h-8"/></svg>'},
    {key:'other',label:'Other Charges',icon:'<svg viewBox="0 0 24 24"><path d="M12 2v20M17 7l-5-5-5 5M7 17l5 5 5-5M2 12h20"/></svg>'},
  ];

  let filtered=rates.filter(r=>r.type===rateType);
  const isAirTab=rateType==='air';

  // Air freight has different data structure
  if(rateSearch){
    if(isAirTab){
      filtered=filtered.filter(r=>{
        const carrierName=(r.carrier?.name||'').toLowerCase();
        const carrierCode=(r.carrier?.code||'').toLowerCase();
        const origin=(r.originPort||'').toLowerCase();
        const dest=(r.destinationPort||'').toLowerCase();
        return carrierName.includes(rateSearch)||carrierCode.includes(rateSearch)||origin.includes(rateSearch)||dest.includes(rateSearch);
      });
    }else{
      filtered=filtered.filter(r=>
        r.carrier.toLowerCase().includes(rateSearch)||
        r.pol.toLowerCase().includes(rateSearch)||
        r.pod.toLowerCase().includes(rateSearch)||
        r.origin.toLowerCase().includes(rateSearch)||
        r.dest.toLowerCase().includes(rateSearch)
      );
    }
  }

  if(isAirTab){
    if(rateCarrier)filtered=filtered.filter(r=>r.carrier?.name===rateCarrier);
    if(rateRateType)filtered=filtered.filter(r=>r.rateType===rateRateType);
    if(rateDirection)filtered=filtered.filter(r=>r.direction===rateDirection);
  }else{
    if(rateCarrier)filtered=filtered.filter(r=>r.carrier===rateCarrier);
    if(rateRateType)filtered=filtered.filter(r=>r.rateType===rateRateType);
  }

  const typeRates=rates.filter(r=>r.type===rateType);
  const carriers=isAirTab
    ?[...new Set(typeRates.map(r=>r.carrier?.name).filter(Boolean))].sort()
    :[...new Set(typeRates.map(r=>r.carrier))].sort();
  const rateTypes=[...new Set(typeRates.map(r=>r.rateType))].sort();
  const directions=isAirTab?[...new Set(typeRates.map(r=>r.direction).filter(Boolean))].sort():[];

    <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input type="text" placeholder="Search rates…" value="${esc(rateSearch)}" oninput="searchRates(this.value)" style="border:none;outline:none;background:transparent;flex:1;font-family:var(--f-body);font-size:13px;color:var(--ink)"></div>
    <select onchange="filterCarrier(this.value)" style="font-size:13px;font-weight:500;color:var(--ink)"><option value="">All carriers</option>${carriers.map(c=>`<option value="${esc(c)}" ${rateCarrier===c?'selected':''}>${esc(c)}</option>`).join('')}</select>
    <select onchange="filterRateType(this.value)" style="font-size:13px;font-weight:500;color:var(--ink)"><option value="">All rate types</option>${rateTypes.map(rt=>`<option value="${esc(rt)}" ${rateRateType===rt?'selected':''}>${esc(rt)}</option>`).join('')}</select>
  </div>`;

  const isAir=rateType==='air';
  const isOcean=rateType==='ocean';
  const col1Label=isAir?'+45kg':'20\'';
  const col2Label=isAir?'+100kg':'40\'';
  const col3Label=isAir?'+300kg':'40HC';

  const marketRates={
    'CNSHA-NGAPP-40HC':4200,
    'CNSHA-NGAPP-40\'':3850,
    'CNSHA-NGAPP-20GP':2350,
    'CNTAO-NGAPP-40HC':4300,
    'CNTAO-NGAPP-40\'':3950,
    'CNTAO-NGAPP-20\'':2400,
    'AEJEA-NGAPP-40HC':3700,
    'AEJEA-NGAPP-40\'':3400,
    'AEJEA-NGAPP-20GP':2500,
    'NLRTM-NGAPP-40HC':1400,
    'DEHAM-NGAPP-40HC':2700,
    'DEHAM-NGAPP-40RF':2650,
    'TRIST-NGAPP-40HC':1700
  };

  function getMarketRate(pol,pod,equipment){
    const routeKey=`${pol}-${pod}-${equipment}`;
    return marketRates[routeKey]||null;
  }

  const isHaulageExport=rateType==='haulage-export';
  const isHaulageImport=rateType==='haulage-import';
  const isOther=rateType==='other';

  html+=`<div class="tbl-wrap"><table><thead><tr>`;

  if(isHaulageExport){
    html+=`<th>ORIGIN</th><th>DESTINATION</th><th>TERMINAL</th><th>20FT</th><th>40FT</th><th>2X20FT</th>`;
  }else if(isHaulageImport){
    html+=`<th>ORIGIN</th><th>DESTINATION</th><th>TERMINAL</th><th>20FT</th><th>40FT</th><th>2X20FT</th>`;
  }else if(isOther){
    html+=`<th>CLASSIFICATION</th><th>PARAMETERS</th><th>CLASS</th><th>20FT</th><th>40FT</th><th>40HC</th>`;
  }else if(isAir){
    // Air Freight - new columns per spec (using consistent th styling from CSS)
    html+=`<th>CARRIER</th><th>ORIGIN</th><th>DEST</th><th>TYPE</th><th>CLASS</th><th>RATE</th><th>BASIS</th><th>TRANSIT</th>`;
  }else{
    // Ocean Freight
    html+=`<th>CARRIER</th><th>ORIGIN PORT</th><th>DESTINATION PORT</th><th>RATE TYPE</th><th>${col1Label}</th><th>${col2Label}</th><th>${col3Label}</th><th>TRANSIT TIME</th><th>FREE DAYS</th><th>VALIDITY</th>`;
  }

  html+=`</tr></thead><tbody>`;

  const emptyColspan=isOther?6:(isHaulageExport||isHaulageImport)?6:isAir?8:10;

  if(filtered.length===0){
    html+=`<tr><td colspan="${emptyColspan}" style="text-align:center;padding:40px;color:var(--muted)">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:0.3"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">No rates found</div>
      <div style="font-size:13px">Try adjusting your search or filters</div>
    </td></tr>`;
  }else{
    filtered.forEach(r=>{
      const expDate=new Date(r.expiry);
      const isExpired=expDate<today;
      const expiredClass=isExpired?' expired':'';

      if(isHaulageExport){
        html+=`<tr class="rate-row${expiredClass}" onclick="openRateDetails('${r.id}')">
          <td style="font-weight:600;color:var(--ink)">${r.originCity}, ${r.state}</td>
          <td>${r.port}</td>
          <td style="font-size:12px;color:var(--muted-2)">${r.terminal}</td>
          <td class="rate-amount">₦${r.price20.toLocaleString()}</td>
          <td class="rate-amount">₦${r.price40.toLocaleString()}</td>
          <td class="rate-amount">₦${r.price2x20.toLocaleString()}</td>
        </tr>`;
      }else if(isHaulageImport){
        html+=`<tr class="rate-row${expiredClass}" onclick="openRateDetails('${r.id}')">
          <td style="font-weight:600;color:var(--ink)">${r.port}</td>
          <td>${r.destCity}, ${r.state}</td>
          <td style="font-size:12px;color:var(--muted-2)">${r.terminal}</td>
          <td class="rate-amount">₦${r.price20.toLocaleString()}</td>
          <td class="rate-amount">₦${r.price40.toLocaleString()}</td>
          <td class="rate-amount">₦${r.price2x20.toLocaleString()}</td>
        </tr>`;
      }else if(isOther){
        const classBg=r.cargoClass==='DG'?'#FFF3CC':'#EDEFE8';
        const classColor=r.cargoClass==='DG'?'#B8860B':'#5F5E5A';
        html+=`<tr class="rate-row${expiredClass}" onclick="openRateDetails('${r.id}')">
          <td style="font-weight:600;color:var(--ink)">${r.category}</td>
          <td>${r.item}</td>
          <td>${r.cargoClass?`<span style="background:${classBg};color:${classColor};padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600">${r.cargoClass}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
          <td class="rate-amount">${r.currency==='NGN'?'₦':'$'}${r.price20.toLocaleString()}</td>
          <td class="rate-amount">${r.currency==='NGN'?'₦':'$'}${r.price40.toLocaleString()}</td>
          <td class="rate-amount">${r.currency==='NGN'?'₦':'$'}${r.price40hc.toLocaleString()}</td>
        </tr>`;
      }else if(isAir){
        // Air Freight - new rendering per spec
        const carrierName=r.carrier?.name||null;
        const carrierCode=r.carrier?.code||null;
        const carrierInitials=carrierCode||(carrierName?carrierName.split(' ').map(w=>w[0]).join('').slice(0,3):'—');
        const carrierDisplay=carrierName?`<span style="font-weight:600;color:var(--green)">${carrierName}</span>`:'<span style="color:var(--muted);font-style:italic">Unnamed</span>';

        // Type badge with abbreviation (spot or contract only)
        const typeLabel=r.rateType==='contract'?'Contr.':'Spot';
        const rateClass=r.rateType.replace(' ','-');

        // Class badge (DG or FAK)
        const classBg=r.cargoClass==='DG'?'#FFF3CC':'#EDEFE8';
        const classColor=r.cargoClass==='DG'?'#B8860B':'#5F5E5A';

        // Rate display
        const rateUnit=r.rateUnit==='cw'?'/CW':'/kg';
        const hasBreaks=r.breaks&&r.breaks.length>0;
        const ratePrefix=hasBreaks?'from ':'';
        const tierIcon=hasBreaks?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2" style="margin-left:4px;vertical-align:middle"><path d="M4 20V10M10 20V4M16 20v-7"/></svg>':'';

        // Basis display
        let basisDisplay='Actual';
        if(r.weightBasis==='chargeable'){
          basisDisplay='CW';
          if(r.volumeRatioKgPerCbm){
            const ratio=Math.round(r.volumeRatioKgPerCbm);
            if(ratio===167||ratio===166)basisDisplay+=' · 1:6';
          }
        }

        html+=`<tr class="rate-row" onclick="openAirRateModal('${r.id}')">
          <td><span class="carrier-logo">${carrierInitials}</span>${carrierDisplay}</td>
          <td style="font-size:12px">${r.originPort?`<span style="font-weight:600;color:var(--ink)">${r.originPort}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
          <td style="font-size:12px">${r.destinationPort?`<span style="font-weight:600;color:var(--ink)">${r.destinationPort}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
          <td><span class="rate-badge ${rateClass}">${typeLabel}</span></td>
          <td>${r.cargoClass?`<span style="background:${classBg};color:${classColor};padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600">${r.cargoClass}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
          <td class="rate-amount">${ratePrefix}$${r.headlineRate.toFixed(2)}${rateUnit}${tierIcon}</td>
          <td style="color:var(--muted-2);font-size:12px">${basisDisplay}</td>
          <td style="color:var(--muted-2)">${r.transitTime||'—'}</td>
        </tr>`;
      }else{
        // Ocean Freight
        const rateClass=r.rateType.replace(' ','-');
        const carrierInitials=r.carrier.split(' ').map(w=>w[0]).join('').slice(0,3);
        const logoClass=carrierClass(r.carrier);
        const logoPath=carrierLogo(r.carrier);
        const logoHtml=logoPath?`<img src="${logoPath}" alt="${r.carrier}">`:carrierInitials;

        html+=`<tr class="rate-row${expiredClass}" onclick="openRateDetails('${r.id}')">
          <td><span class="carrier-logo ${logoClass}">${logoHtml}</span><span style="font-weight:600;color:var(--green)">${r.carrier}</span></td>
          <td style="font-size:12px"><div style="font-weight:600;color:var(--ink)">${r.pol}</div><div style="color:var(--muted);margin-top:1px">${r.origin}</div></td>
          <td style="font-size:12px"><div style="font-weight:600;color:var(--ink)">${r.pod}</div><div style="color:var(--muted);margin-top:1px">${r.dest}</div></td>
          <td><span class="rate-badge ${rateClass}">${r.rateType}</span></td>
          <td class="rate-amount">${formatAmount(r.rate20,r.type)}</td>
          <td class="rate-amount">${formatAmount(r.rate40,r.type)}</td>
          <td class="rate-amount">${formatAmount(r.rate40hc,r.type)}</td>
          <td style="color:var(--muted-2)">${r.transit}d</td>
          <td style="color:var(--muted-2)">${r.freeDays||'—'}d</td>
          <td>${formatExpiry(r.expiry)}</td>
        </tr>`;
      }
    });
  }

  html+=`</tbody></table></div>`;
  $('#content').innerHTML=html;
}

function renderBrain(){
  $('#content').innerHTML=`<div style="padding:40px;text-align:center">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.5" style="margin-bottom:20px;opacity:0.3"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/></svg>
    <h3 style="font-size:20px;color:var(--green);margin-bottom:8px">AI Automation</h3>
    <p style="color:var(--muted);font-size:14px">Claude AI for email classification, RFQ extraction, quote generation, and intelligent automation.</p>
  </div>`;
}
</script>
</body>
</html>
