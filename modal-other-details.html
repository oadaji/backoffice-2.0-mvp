<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Other Charge Details Modal - OnePort 365</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Nohemi';font-style:normal;font-weight:400 500;src:url('https://db.onlinewebfonts.com/t/29ddb4605533a38e086b48fa105e0d12.woff2') format('woff2');font-display:swap}
@font-face{font-family:'Nohemi';font-style:normal;font-weight:600 800;src:url('https://db.onlinewebfonts.com/t/2acd1ac6664b7b1a1545cc36d0680783.woff2') format('woff2');font-display:swap}
:root{
  --green:#023819; --green-2:#2f6b1e; --green-3:#7fae2e; --lime:#BFFB4F; --lime-soft:#EDF4E1;
  --gold:#FFCC1A; --gold-deep:#B8860B; --success:#008751; --error:#FF1A1A;
  --cream:#FDFBF1; --panel:#FFFFFF; --page:#faf9f5; --sage:#D1DBBD;
  --line:rgba(2,56,25,.09); --line-2:rgba(2,56,25,.16);
  --ink:#383838; --muted:#808080; --muted-2:#5F5E5A;
  --sh-card:0 1px 2px rgba(2,56,25,.05);
  --sh-raise:0 2px 4px rgba(2,56,25,.05),0 10px 24px -10px rgba(2,56,25,.16);
  --sh-modal:0 4px 8px rgba(2,56,25,.06),0 18px 40px -16px rgba(2,56,25,.22);
  --f-head:'Nohemi','Poppins',sans-serif; --f-body:'Poppins',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f-body);color:var(--ink);background:var(--page);font-size:14px;-webkit-font-smoothing:antialiased;padding:40px}
.overlay{position:fixed;inset:0;background:rgba(10,26,12,.42);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
.modal{background:#fff;border-radius:16px;max-width:520px;width:100%;box-shadow:var(--sh-modal);max-height:90vh;display:flex;flex-direction:column}
.modal.wide{max-width:800px}
.modal-head{padding:24px 24px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start}
.modal-head h3{font-size:20px;font-weight:700;color:var(--green);margin-bottom:2px}
.modal-head .mh-sub{font-size:13px;color:var(--muted);margin-top:4px}
.modal-head .x{border:none;background:none;font-size:28px;color:var(--muted);cursor:pointer;padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.modal-head .x:hover{background:var(--cream)}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.btn{border:1px solid transparent;border-radius:10px;padding:11px 18px;font-family:var(--f-body);font-weight:600;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.btn-ghost{background:#fff;border:1px solid var(--line-2);color:var(--ink)}
.btn-lime{background:var(--lime);color:var(--green);box-shadow:var(--sh-card)}
</style>
</head>
<body>
<div class="overlay">
  <div class="modal wide">
    <div class="modal-head">
      <div>
        <h3>Charge Details</h3>
        <div class="mh-sub">View charge information</div>
      </div>
      <button class="x">×</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:20px">
        <label style="font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px;display:block">Item</label>
        <div style="font-weight:600;font-size:17px;color:var(--green)">Terminal Handling Charge (THC)</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
        <div>
          <label style="font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px;display:block">Category</label>
          <div style="font-size:14px;color:var(--ink)">Port Charges</div>
        </div>
        <div>
          <label style="font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px;display:block">Charge Type</label>
          <div style="font-size:14px;color:var(--ink)">Fixed</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px">
        <div>
          <label style="font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px;display:block">20'</label>
          <div style="font-weight:700;font-size:18px;color:var(--green)">$180</div>
        </div>
        <div>
          <label style="font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px;display:block">40'</label>
          <div style="font-weight:700;font-size:18px;color:var(--green)">$260</div>
        </div>
        <div>
          <label style="font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px;display:block">40HC</label>
          <div style="font-weight:700;font-size:18px;color:var(--green)">$290</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <label style="font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px;display:block">As Per Receipt</label>
          <div style="font-size:14px;color:var(--ink)">No</div>
        </div>
        <div>
          <label style="font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px;display:block">Expiry Date</label>
          <div style="font-size:14px;color:var(--ink)">December 31, 2026</div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost">Close</button>
      <button class="btn btn-lime">Request Quote</button>
    </div>
  </div>
</div>
</body>
</html>
